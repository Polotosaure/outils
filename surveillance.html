<!DOCTYPE html>

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .shadow-sm, .shadow-md, .shadow-xl { box-shadow: none !important; }
            .page-break { page-break-before: always; }
            .category-section { page-break-inside: avoid; }
        }
        .drug-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <!-- En-tête -->
    <div class="no-print sticky top-0 z-50 bg-white border-b shadow-sm p-4 mb-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <a href="index.html" class="p-2 hover:bg-slate-100 rounded-full transition-colors" title="Retour à l'accueil">
                    <i data-lucide="arrow-left" class="text-slate-600"></i>
                </a>
                <div class="bg-cyan-600 p-2 rounded-lg text-white">
                    <i data-lucide="clipboard-check" width="20" height="20"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800">Surveillance Psychiatrique</h1>
            </div>

            <div class="flex items-center gap-3">
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="searchInput" placeholder="Rechercher un médicament..."

                </div>
                <button onclick="window.print()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="Imprimer">
                    <i data-lucide="printer" class="text-slate-600"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Contenu Principal -->
    <div class="max-w-7xl mx-auto p-4 md:p-6 mb-12">

        <!-- Légende -->
        <div class="no-print bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
            <div class="flex flex-wrap gap-4 text-xs">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span>
                    <span class="text-slate-600">Surveillance stricte / Risque élevé</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-orange-500"></span>
                    <span class="text-slate-600">Surveillance régulière recommandée</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                    <span class="text-slate-600">Surveillance standard / Si terrain</span>
                </div>
            </div>
        </div>

        <!-- Sections par catégorie -->
        <div id="content"></div>

    </div>

        function getPriorityBadge(priority) {
            const badges = {
                high: '<span class="inline-flex items-center justify-center w-2 h-2 rounded-full bg-red-500" title="Surveillance stricte"></span>',
                medium: '<span class="inline-flex items-center justify-center w-2 h-2 rounded-full bg-orange-500" title="Surveillance régulière"></span>',
                low: '<span class="inline-flex items-center justify-center w-2 h-2 rounded-full bg-blue-500" title="Surveillance standard"></span>'
            };
            return badges[priority] || badges.low;
        }

        function renderContent(filter = "") {
            const content = document.getElementById('content');
            content.innerHTML = "";
            const lowerFilter = filter.toLowerCase();

            Object.entries(medications).forEach(([key, category]) => {
                // Filtrer les médicaments de la catégorie
                const filteredDrugs = category.drugs.filter(drug => {
                    const searchText = `${drug.name} ${drug.brand} ${drug.doses}`.toLowerCase();
                    return searchText.includes(lowerFilter);
                });

                if (filteredDrugs.length === 0) return;

                const section = document.createElement('div');
                section.className = 'category-section mb-8';

                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="p-2 bg-${category.color}-100 text-${category.color}-600 rounded-lg">
                            <i data-lucide="${category.icon}" width="20" height="20"></i>
                        </div>
                        <h2 class="text-lg font-bold text-slate-700">${category.title}</h2>
                    </div>
                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                        ${filteredDrugs.map(drug => renderDrugCard(drug, category.color)).join('')}
                    </div>
                `;

                content.appendChild(section);
            });

            if (content.children.length === 0) {
                content.innerHTML = `
                    <div class="text-center py-12 text-slate-400">
                        <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                        <p>Aucun médicament trouvé pour "${filter}"</p>
                    </div>
                `;
            }

            lucide.createIcons();
        }

        function renderDrugCard(drug, color) {
            return `
                <div class="drug-card bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-200">
                    <div class="h-1.5 bg-${color}-500"></div>
                    <div class="p-5">
                        <!-- En-tête médicament -->
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-slate-800">${drug.name}</h3>
                                <p class="text-${color}-600 font-medium">${drug.brand}</p>
                            </div>
                            <span class="text-xs font-medium px-2 py-1 bg-slate-100 text-slate-500 rounded">${drug.doses}</span>
                        </div>

                        <!-- Bilan pré-thérapeutique -->
                        <div class="mb-4">
                            <div class="flex items-center gap-2 mb-2">
                                <i data-lucide="clipboard-list" class="w-4 h-4 text-slate-400"></i>
                                <h4 class="text-sm font-bold text-slate-600 uppercase tracking-wide">Bilan pré-thérapeutique</h4>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-3">
                                <ul class="space-y-1.5 text-sm">
                                    ${drug.preTherapy.map(item => `
                                        <li class="flex items-start gap-2">
                                            ${getPriorityBadge(item.priority)}
                                            <span class="font-medium text-slate-700">${item.test}</span>
                                            ${item.note ? `<span class="text-slate-500 text-xs">– ${item.note}</span>` : ''}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>

                        <!-- Surveillance en cours -->
                        <div class="mb-4">
                            <div class="flex items-center gap-2 mb-2">
                                <i data-lucide="activity" class="w-4 h-4 text-slate-400"></i>
                                <h4 class="text-sm font-bold text-slate-600 uppercase tracking-wide">Surveillance en cours de traitement</h4>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-3">
                                <div class="space-y-2 text-sm">
                                    ${drug.ongoing.map(item => `
                                        <div class="flex items-start gap-2">
                                            ${getPriorityBadge(item.priority)}
                                            <div class="flex-1">
                                                <span class="font-medium text-slate-700">${item.test}</span>
                                                <span class="text-${color}-600 text-xs ml-2">${item.frequency}</span>
                                                ${item.note ? `<p class="text-slate-500 text-xs mt-0.5">${item.note}</p>` : ''}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- Points d'attention -->
                        ${drug.warnings && drug.warnings.length > 0 ? `
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <i data-lucide="alert-triangle" class="w-4 h-4 text-amber-500"></i>
                                <h4 class="text-sm font-bold text-amber-600 uppercase tracking-wide">Points d'attention</h4>
                            </div>
                            <div class="bg-amber-50 border border-amber-100 rounded-lg p-3">
                                <ul class="space-y-1 text-xs text-amber-800">
                                    ${drug.warnings.map(w => `<li class="flex items-start gap-1.5"><span class="text-amber-500 mt-0.5">•</span>${w}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Initialisation
        renderContent();
        lucide.createIcons();

        // Recherche
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderContent(e.target.value);
        });
    </script>
</body>
</html>
